    tasks:
      - 'Create a shared API client'
      - 'Branch defaults by request input'
      - 'Override defaults per request without rebuilding the client'
    failure_modes:
      - mistake: 'Pass a function to upfetch'
        mechanism: 'Since v1.3.0, upfetch takes an options object as its second argument; request-aware logic belongs in up(fetch, getDefaultOptions).'
        wrong_pattern: |
          await upfetch('/users', (defaults) => ({
            ...defaults,
            timeout: 5000,
          }))
        correct_pattern: |
          const upfetch = up(fetch, (input) => ({
            timeout: input.toString().startsWith('/export/') ? 30000 : 5000,
          }))
          await upfetch('/users', { timeout: 5000 })
        source: 'v1.3.0 CHANGELOG.md'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'The functional per-request override API was removed in v1.3.0.'
      - mistake: 'Pass an object to up'
        mechanism: 'The second argument of up is intentionally a function or omitted entirely; passing a plain object removes dynamic defaults and is not supported.'
        wrong_pattern: |
          const upfetch = up(fetch, {
            baseUrl: 'https://example.com',
          })
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            baseUrl: 'https://example.com',
          }))
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Set a default request body'
        mechanism: 'Default options are merged, but body is intentionally ignored unless it is passed on the concrete upfetch call.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            method: 'POST',
            body: JSON.stringify({ role: 'admin' }),
          }))
          await upfetch('/users')
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            method: 'POST',
          }))
          await upfetch('/users', { body: { role: 'admin' } })
        source: 'src/tests/body.spec.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Rewrite URL inside onRequest'
        mechanism: 'onRequest receives a Request after URL resolution, so changing baseUrl there is too late and leads to confusing no-op mutations.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            onRequest(request) {
              ;(request as any).baseUrl = adminBaseUrl()
            },
          }))
        correct_pattern: |
          const upfetch = up(fetch, (input) => ({
            baseUrl: input.toString().startsWith('/admin/')
              ? adminBaseUrl()
              : publicBaseUrl(),
          }))
        source: 'src/up.ts; issue #63'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
