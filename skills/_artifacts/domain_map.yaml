skills:
  - name: 'Create upfetch client'
    slug: 'create-upfetch-client'
    domain: 'configuring-reusable-clients'
    description: 'Create a reusable upfetch instance with shared defaults and request-aware configuration.'
    type: 'core'
    covers:
      - 'up(fetch, getDefaultOptions?)'
