tensions:
  - name: 'Reuse versus runtime dynamism'
    skills: ['create-upfetch-client', 'add-auth-and-dynamic-defaults']
    description: 'A shared client should stay stable at module scope, but the defaults it returns often need to be recomputed per request.'
    implication: 'Agents either freeze runtime state outside up or overcorrect by rebuilding clients instead of using request-aware defaults.'

  - name: 'Runtime validation versus quick typing'
    skills: ['validate-parse-and-handle-errors', 'customize-serialization-and-request-shape']
    description: 'Schemas and typed serializers catch real runtime mismatches, but generic annotations and raw objects look faster to write.'
    implication: 'Agents optimize for compile-time convenience and skip the runtime validation and serialization contracts that make the client safe.'

  - name: 'Fetch familiarity versus wrapped lifecycle'
    skills: ['create-upfetch-client', 'configure-retries-timeouts-and-hooks', 'debug-streaming-and-runtime-fetch']
    description: 'up-fetch looks like fetch on the surface, but URL resolution, hook order, retry timing, and stream wrapping happen at specific lifecycle points.'
    implication: 'Agents mutate the wrong object at the wrong stage or expect retries and hooks to behave like generic middleware.'

cross_references:
  - from: 'create-upfetch-client'
    to: 'add-auth-and-dynamic-defaults'
    reason: 'Auth is implemented through the same getDefaultOptions mechanism that defines reusable client defaults.'

  - from: 'create-upfetch-client'
    to: 'customize-serialization-and-request-shape'
    reason: 'Client-level defaults often need matching body and params serializers to stay correct across all requests.'

  - from: 'validate-parse-and-handle-errors'
    to: 'configure-retries-timeouts-and-hooks'
    reason: 'reject and parseRejected decide which failures throw, while retry and timeout decide which failures are retried before parsing.'

  - from: 'configure-retries-timeouts-and-hooks'
    to: 'debug-streaming-and-runtime-fetch'
    reason: 'Timeouts, aborts, and retries surface differently when fetch is patched or when streaming support changes by runtime.'

  - from: 'debug-streaming-and-runtime-fetch'
    to: 'create-upfetch-client'
    reason: 'The choice between plain up(fetch) and a dynamic fetch wrapper is made when the shared client is created.'

