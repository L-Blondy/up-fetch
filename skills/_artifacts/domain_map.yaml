  - name: 'Add auth and dynamic defaults'
    slug: 'add-auth-and-dynamic-defaults'
    domain: 'configuring-reusable-clients'
    description: 'Attach auth and other per-request defaults without freezing runtime state or mutating the wrong object.'
    type: 'core'
    covers:
      - 'headers'
      - 'Authorization'
      - 'async token lookup'
      - 'onRequest(request)'
      - 'deleting default options with undefined'
    tasks:
      - 'Add bearer tokens to every request'
      - 'Read tokens dynamically before each call'
      - 'Remove or override auth defaults on specific requests'
    failure_modes:
      - mistake: 'Read token outside the factory'
        mechanism: 'Values such as auth tokens are captured once at module load, so later requests keep using stale credentials.'
        wrong_pattern: |
          const token = localStorage.getItem('token')
          const upfetch = up(fetch, () => ({
            headers: { Authorization: `Bearer ${token}` },
          }))
        correct_pattern: |
          const upfetch = up(fetch, () => {
            const token = localStorage.getItem('token')
            return { headers: { Authorization: `Bearer ${token}` } }
          })
        source: 'README.md Authentication; maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
        skills: ['add-auth-and-dynamic-defaults', 'create-upfetch-client']
      - mistake: 'Use legacy onBeforeFetch signature'
        mechanism: 'Agents trained on older versions often generate onBeforeFetch or treat onRequest as if it receives mutable options, but v2 uses onRequest(request).'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            onBeforeFetch(options) {
              options.headers.set('Authorization', getToken())
            },
          }))
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            onRequest(request) {
              request.headers.set('Authorization', getToken())
            },
          }))
        source: 'v1.2.0 CHANGELOG.md; v1.1.0 README.md; issue #52'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'onBeforeFetch was renamed to onRequest in v1.2.0, and the callback now works on Request objects.'
      - mistake: 'Clear auth with an empty string'
        mechanism: 'An empty string leaves the header present; use undefined when you want to remove a default header on a specific request.'
        wrong_pattern: |
          await upfetch('/public', {
            headers: { Authorization: '' },
          })
        correct_pattern: |
          await upfetch('/public', {
            headers: { Authorization: undefined },
          })
        source: 'README.md Delete a default option; src/tests/header.spec.ts'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Assume browser storage exists everywhere'
        mechanism: 'The auth examples use localStorage, but up-fetch also targets Node, Bun, Deno, Workers, and Edge runtimes where window-based storage may not exist.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            headers: { Authorization: localStorage.getItem('token') },
          }))
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            headers: {
              Authorization:
                typeof window !== 'undefined'
                  ? localStorage.getItem('token')
                  : undefined,
            },
          }))
        source: 'README.md Authentication; README.md Environment Support (inference from supported runtimes)'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Default to localStorage auth everywhere'
        mechanism: 'Agents should prefer cookies, request headers, or other runtime-appropriate sources instead of assuming browser storage is the right auth source.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            headers: { Authorization: localStorage.getItem('token') },
          }))
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            headers: {
              Authorization: getRequestScopedToken() ?? undefined,
            },
          }))
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Applies in v2.5.1.'

  - name: 'Validate, parse, and handle errors'
    slug: 'validate-parse-and-handle-errors'
    domain: 'interpreting-server-responses'
    description: 'Parse successful and rejected responses correctly, attach runtime validation, and classify failures with the right hooks and error types.'
    type: 'core'
    covers:
      - 'schema'
      - 'parseResponse'
      - 'parseRejected'
      - 'reject'
      - 'ResponseError'
      - 'ValidationError'
      - 'isResponseError'
      - 'isValidationError'
    tasks:
      - 'Validate API responses with Standard Schema libraries'
      - 'Customize parsing for success and failure cases'
      - 'Handle errors as exceptions or values'
    failure_modes:
      - mistake: 'Type responses with generics only'
        mechanism: 'Generic annotations change compile-time expectations but do not validate the runtime payload, which is one of up-fetch’s main value propositions.'
        wrong_pattern: |
          const todo = await upfetch<{ id: number }>('/todo')
          console.log(todo.id)
        correct_pattern: |
          const todo = await upfetch('/todo', {
            schema: z.object({ id: z.number() }),
          })
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Trust any from unschematized calls'
        mechanism: 'When no schema is provided, the default return type is any, so agents can silently bypass type safety unless they choose a schema or an explicit unknown boundary.'
        wrong_pattern: |
          const data = await upfetch('/todo')
          data.deep.property.call()
        correct_pattern: |
          const data = await upfetch('/todo', {
            schema: z.unknown(),
          })
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'In v2.5.1 the unschematized default is any; the maintainer would prefer unknown.'
      - mistake: 'Expect schema to validate requests'
        mechanism: 'The schema option validates the parsed response; it does not validate request bodies, params, or query input.'
        wrong_pattern: |
          await upfetch('/todos', {
            method: 'POST',
            body: { title: 123 },
            schema: z.object({ title: z.string() }),
          })
        correct_pattern: |
          const body = requestBodySchema.parse({ title: 123 })
          await upfetch('/todos', {
            method: 'POST',
            body,
            schema: responseSchema,
          })
        source: 'README.md API Reference; issue #83'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Keep legacy error option names'
        mechanism: 'Agents trained on v1 code still generate throwResponseError and parseResponseError, but current code uses reject and parseRejected.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            throwResponseError: () => true,
            parseResponseError: (response) => response.json(),
          }))
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            reject: () => true,
            parseRejected: (response) => response.json(),
          }))
        source: 'v1.3.5 CHANGELOG.md; v1.3.6 README.md'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'The legacy names were deprecated in v1.3.5 and removed in v2.0.0.'
      - mistake: 'Return error values without disabling reject'
        mechanism: 'parseResponse only runs when reject returns false, so the default reject path will throw before an error-as-value parser can run.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            parseResponse: async (response) => ({
              data: await response.json(),
              error: null,
            }),
          }))
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            reject: () => false,
            parseResponse: async (response) => {
              const json = await response.json()
              return response.ok ? { data: json, error: null } : { data: null, error: json }
            },
          }))
        source: 'README.md Advanced Usage / Error as value'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Expect typed data from bare up(fetch)'
        mechanism: 'Without schema or parseResponse, the default return type is any, so runtime parsing still works but the type surface stays intentionally loose.'
        wrong_pattern: |
          const upfetch = up(fetch)
          const user = await upfetch('/users/1')
          user.id
        correct_pattern: |
          const upfetch = up(fetch)
          const user = await upfetch('/users/1', {
            schema: z.object({ id: z.number() }),
          })
        source: 'src/types.ts; src/tests/types.spec-d.ts; issue #37'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Use pre-Standard-Schema Zod'
        mechanism: 'up-fetch expects Standard Schema compatible validators, so older Zod versions without the ~standard integration fail at compile time.'
        wrong_pattern: |
          import { z } from 'zod'
          await upfetch('/users/1', { schema: z.object({ id: z.number() }) })
        correct_pattern: |
          import { z } from 'zod'
          // Use Zod 3.24+ or another Standard Schema implementation
          await upfetch('/users/1', { schema: z.object({ id: z.number() }) })
        source: 'README.md Schema Validation; issue #37'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Zod support in current docs targets v3.24+.'

  - name: 'Customize serialization and request shape'
    slug: 'customize-serialization-and-request-shape'
    domain: 'shaping-requests'
    description: 'Adjust params, body serialization, and header behavior when the defaults are too simple for a real API.'
    type: 'core'
    covers:
      - 'params'
      - 'serializeParams'
      - 'body'
      - 'serializeBody'
      - 'automatic content-type handling'
      - 'header and param removal with undefined'
    tasks:
      - 'Serialize nested query parameters'
      - 'Send FormData or custom body formats'
      - 'Override default params or headers per request'
    reference_candidates:
      - topic: 'serialization and merge rules'
        reason: 'serializeParams, serializeBody, automatic content-type, and header/params removal rules interact across several edge cases.'
    failure_modes:
      - mistake: 'Use nested params with defaults'
        mechanism: 'The default serializer is intentionally simple and is based on URLSearchParams, so nested objects need a custom serializer.'
        wrong_pattern: |
          await upfetch('/search', {
            params: { filter: { status: 'open' } },
          })
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            serializeParams: (params) => queryString.stringify(params),
          }))
          await upfetch('/search', { params: { filter: { status: 'open' } } })
        source: 'src/fallback-options.ts; README.md Custom params serialization; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Manually concatenate query strings'
        mechanism: 'Senior users lean on params instead of hand-building URLs, which avoids duplicated encoding and keeps merge rules consistent.'
        wrong_pattern: |
          await upfetch(`/todos?search=${search}&skip=${skip}&take=${take}`)
        correct_pattern: |
          await upfetch('/todos', {
            params: { search, skip, take },
          })
        source: 'README.md Simple Query Parameters; maintainer interview'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Define the same param twice'
        mechanism: 'URL-defined search params are preserved, and fetcher params are appended, so duplicating a key in both places can produce duplicate query entries.'
        wrong_pattern: |
          await upfetch('/todos?hello=people', {
            params: { hello: 'test' },
          })
        correct_pattern: |
          await upfetch('/todos', {
            params: { hello: 'test' },
          })
        source: 'src/utils.ts; src/tests/params.spec.ts'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Expect URL params in serializeParams'
        mechanism: 'serializeParams receives the params object being serialized, not the existing query string embedded in the input URL.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            serializeParams(params) {
              return params.a && params.b ? 'a=1&b=2' : ''
            },
          }))
          await upfetch('/path?b=2', { params: { a: 1 } })
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            serializeParams(params) {
              return fallbackOptions.serializeParams(params)
            },
          }))
          await upfetch('/path?b=2', { params: { a: 1 } })
        source: 'src/tests/params.spec.ts'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Assume serializeBody skips non-JSON bodies'
        mechanism: 'Since v1.3.0, serializeBody receives any non-nullish body, so custom serializers must handle or restrict the body types they accept.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            serializeBody: (body: Record<string, unknown>) => JSON.stringify(body),
          }))
          await upfetch('/upload', { method: 'POST', body: new FormData() })
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            serializeBody: (body: FormData | Record<string, unknown>) =>
              body instanceof FormData ? body : JSON.stringify(body),
          }))
        source: 'v1.3.0 CHANGELOG.md; src/tests/body.spec.ts'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'serializeBody widened in v1.3.0.'
      - mistake: 'Call JSON.stringify before upfetch'
        mechanism: 'up-fetch already serializes jsonifiable bodies by default, so pre-stringifying objects adds noise and makes body typing less useful.'
        wrong_pattern: |
          await upfetch('/todos', {
            method: 'POST',
            body: JSON.stringify({ title: 'New Todo' }),
          })
        correct_pattern: |
          await upfetch('/todos', {
            method: 'POST',
            body: { title: 'New Todo' },
          })
        source: 'README.md Automatic Body Handling; maintainer interview'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Force JSON content type for FormData'
        mechanism: 'If the body serializer returns FormData, the browser should set the multipart boundary; hard-coding JSON or multipart headers breaks that behavior.'
        wrong_pattern: |
          await upfetch('/upload', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: new FormData(),
          })
        correct_pattern: |
          await upfetch('/upload', {
            method: 'POST',
            body: new FormData(),
          })
        source: 'src/tests/header.spec.ts; issue #40'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'This became a common migration pitfall in v2.0.0.'

  - name: 'Configure retries, timeouts, and hooks'
    slug: 'configure-retries-timeouts-and-hooks'
    domain: 'operating-requests-in-production'
    description: 'Control retry timing, request lifecycles, and timeout behavior without assuming plain fetch semantics.'
    type: 'core'
    covers:
      - 'retry'
      - 'timeout'
      - 'onRetry'
      - 'onRequest'
      - 'onResponse'
      - 'onSuccess'
      - 'onError'
    tasks:
      - 'Retry idempotent requests'
      - 'Handle timeouts and abort signals'
      - 'Wire request lifecycle callbacks in the correct order'
    reference_candidates:
      - topic: 'request and response lifecycle ordering'
        reason: 'retry, timeout, reject, parseResponse, parseRejected, and the hook callbacks fire in a specific order that agents frequently guess incorrectly.'
    failure_modes:
      - mistake: 'Expect retries by default'
        mechanism: 'The built-in retry configuration defaults to zero attempts, so server errors are not retried unless the client opts in.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({ baseUrl: apiUrl }))
          await upfetch('/sometimes-500')
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            baseUrl: apiUrl,
            retry: { attempts: 3, delay: 1000 },
          }))
        source: 'src/fallback-options.ts; README.md Retry'
        priority: 'HIGH'
        status: 'active'
        version_context: 'The current default retry attempts value is 0.'
      - mistake: 'Ignore retry error branch'
        mechanism: 'retry.when receives either a response or an error, so status-only logic misses network failures and timeout errors.'
        wrong_pattern: |
          retry: {
            when: ({ response }) => response?.status === 429,
            attempts: 2,
            delay: 1000,
          }
        correct_pattern: |
          retry: {
            when: ({ response, error }) =>
              error?.name === 'TimeoutError' || response?.status === 429,
            attempts: 2,
            delay: 1000,
          }
        source: 'README.md Retry on network errors, timeouts, or any other error; src/tests/retry.spec.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Expect onResponse on every attempt'
        mechanism: 'onResponse runs once after retries are finished, while onRetry is the per-attempt callback.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            retry: { attempts: 3, when: () => true },
            onResponse() {
              console.log('attempt finished')
            },
          }))
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            retry: { attempts: 3, when: () => true },
            onRetry() {
              console.log('retrying')
            },
          }))
        source: 'src/tests/on-response.spec.ts; commit 8a60526'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'onResponse was added in v2.5.0 and explicitly runs once after retries.'
      - mistake: 'Assume callback timing from intuition'
        mechanism: 'The lifecycle hooks fire in a specific order, so guessing when onRequest, onResponse, onSuccess, and onError run leads to subtle logic bugs.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            onSuccess() {
              // assumes parseResponse has not run yet
            },
          }))
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            parseResponse(response) {
              return response.json()
            },
            onSuccess(data) {
              // runs after parsing and schema validation
            },
          }))
        source: 'src/up.ts; src/tests/on-request.spec.ts; src/tests/on-response.spec.ts; src/tests/on-error.spec.ts; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Expect parse errors to retry'
        mechanism: 'Retry decisions happen before parseResponse, parseRejected, and schema validation, so parser or validation failures do not enter the retry loop.'
        wrong_pattern: |
          const upfetch = up(fetch, () => ({
            retry: { attempts: 2, when: () => true },
            parseResponse: () => {
              throw new Error('parse failed')
            },
          }))
        correct_pattern: |
          const upfetch = up(fetch, () => ({
            retry: {
              attempts: 2,
              when: ({ response }) => response?.status === 503,
            },
          }))
        source: 'src/up.ts'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Applies in v2.5.1.'

  - name: 'Debug streaming and runtime fetch behavior'
    slug: 'debug-streaming-and-runtime-fetch'
    domain: 'operating-requests-in-production'
    description: 'Diagnose progress, streaming, and runtime-specific fetch behavior across Node, WebKit, MSW, and other patched environments.'
    type: 'core'
    covers:
      - 'onRequestStreaming'
      - 'onResponseStreaming'
      - 'ReadableStream wrapping'
      - 'patched global fetch'
      - 'Node global fetch'
      - 'undici incompatibility'
    tasks:
      - 'Add upload and download progress'
      - 'Debug mismatches between local tests and production runtimes'
      - 'Handle patched or overridden fetch implementations'
    failure_modes:
      - mistake: 'Pass undici fetch to up'
        mechanism: 'Imported undici.fetch does not accept the global Request instance that up-fetch constructs, so type errors and runtime URL parsing errors follow.'
        wrong_pattern: |
          import { fetch } from 'undici'
          const upfetch = up(fetch)
        correct_pattern: |
          const upfetch = up(globalThis.fetch)
        source: 'src/tests/undici.spec.ts; issue #49'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Applies in v2.5.1.'
      - mistake: 'Capture patched fetch too early'
        mechanism: 'Libraries such as MSW patch global fetch later, so capturing fetch eagerly can bypass the patched implementation during debugging or tests.'
        wrong_pattern: |
          const upfetch = up(fetch)
          await upfetch('/api')
        correct_pattern: |
          const upfetch = up((...args: Parameters<typeof fetch>) => fetch(...args))
          await upfetch('/api')
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Applies in v2.5.1. The maintainer prefers plain up(fetch) unless runtime patching causes issues.'
      - mistake: 'Assume totalBytes always exists'
        mechanism: 'When Content-Length is missing, response streaming reports totalBytes as undefined, so progress code needs a fallback.'
        wrong_pattern: |
          onResponseStreaming({ transferredBytes, totalBytes }) {
            console.log(transferredBytes / totalBytes)
          }
        correct_pattern: |
          onResponseStreaming({ transferredBytes, totalBytes = transferredBytes }) {
            console.log(transferredBytes / totalBytes)
          }
        source: 'src/tests/on-stream-response.spec.ts; commit 9764f9d'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Since v2.3.1, totalBytes no longer defaults to transferredBytes.'
      - mistake: 'Expect upload progress on old WebKit'
        mechanism: 'Safari 14 upload streaming support is missing, so onRequestStreaming cannot be relied on there even though download streaming still works.'
        wrong_pattern: |
          await upfetch('/upload', {
            method: 'POST',
            body: file,
            onRequestStreaming: ({ transferredBytes }) => console.log(transferredBytes),
          })
        correct_pattern: |
          await upfetch('/upload', {
            method: 'POST',
            body: file,
          })
        source: 'src/stream.ts; issue #65'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Applies in WebKit-based environments with missing upload stream support.'
      - mistake: 'Expect streaming callbacks with empty bodies'
        mechanism: 'If the request or response body is empty, the corresponding streaming hook may not emit progress events.'
        wrong_pattern: |
          await upfetch('/empty', {
            onResponseStreaming() {
              console.log('this will always run')
            },
          })
        correct_pattern: |
          await upfetch('/empty', {
            parseResponse: (response) => response.text(),
          })
        source: 'src/tests/on-stream-request.spec.ts; src/tests/on-stream-response.spec.ts'
        priority: 'MEDIUM'
        status: 'active'
